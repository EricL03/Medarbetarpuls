{% load static %}
<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mina enkäter</title>
  <script src="https://unpkg.com/htmx.org@1.8.4"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    /* Top Bar */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      background-color: #f8f9fa;
      position: relative;
    }

    .logo, .back-button {
      height: 40px;
      cursor: pointer;
    }

    .survey {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 24px;
      color: rgb(0, 132, 255);
    }

    /* Search Section */
    .search-container {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      margin-top: 20px;
      padding-left: 150px;
    }

    .search-bar {
      width: 50%;
      padding: 10px 20px;
      font-size: 16px;
      margin-right: 20px;
      border: 1px solid #ccc;
      border-radius: 500px;
    }

    .search-button,
    .toggle-view-button {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-left: 10px;
    }

    .search-button:hover,
    .toggle-view-button:hover {
      background-color: #0056b3;
    }

    /* Survey List Layout */
    .survey-list {
      margin-top: 20px;
    }

    .list-view {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .grid-view {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: flex-start;
      padding: 20px 150px;
    }

    .survey-item {
      background-color: #f8f9fa;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 15px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      text-align: center;
    }

    .survey-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 100%;
    }

    .survey-title {
      font-size: 20px;
      color: #007bff;
      margin-bottom: 10px;
    }

    .survey-actions {
      display: flex;
      gap: 15px;
    }

    .action-icon {
      width: 24px;
      height: 24px;
      cursor: pointer;
    }

    /* Grid-specific */
    .grid-view .survey-item {
      width: 300px;
      height: 300px;
    }

    .grid-view .survey-actions {
      margin-top: auto;
      justify-content: center;
    }

    /* List-specific */
    .list-view .survey-item {
      width: 80%;
      flex-direction: row;
      align-items: center;
    }

    .list-view .survey-content {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 20px;
    }

    .list-view .survey-actions {
      justify-content: flex-start;
    }

    /* Add Survey Button */
    .add-survey-container {
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }

    .add-survey-button {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .add-survey-button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <!-- Top Bar -->
  <header class="top-bar">
    <div class="left-icon">
      <img src="{% static 'logo.png' %}" alt="logo" class="logo" />
    </div>
    <h1 class="survey">Mina enkäter</h1>
    <div class="right-icon">
      <img src="{% static 'go-back-btn.png' %}" alt="back" class="back-button" />
    </div>
  </header>

  <!-- Search and Toggle -->
  <div class="search-container">
    <input type="text" id="search-bar" class="search-bar" placeholder="Sök enkäter..." />
    <button type="button" class="search-button">Sök</button>
    <button type="button" id="toggle-view" class="toggle-view-button">Växla vy</button>
  </div>

  <!-- Survey List -->
  <div class="survey-list list-view" id="surveyList">

    <!-- Survey 1 -->
    <div class="survey-item">
      <div class="survey-content">
        <h2 class="survey-title">Enkät 1</h2>
        <div class="survey-actions">
          <img src="{% static 'trashcan.png' %}" alt="Delete" class="action-icon" />
          <img src="{% static 'edit-icon.png' %}" alt="Edit" class="action-icon" />
          <img src="{% static 'share-icon.png' %}" alt="Share" class="action-icon" />
        </div>
      </div>
    </div>

    <!-- Survey 2 -->
    <div class="survey-item">
      <div class="survey-content">
        <h2 class="survey-title">Enkät 2</h2>
        <div class="survey-actions">
          <img src="{% static 'trashcan.png' %}" alt="Delete" class="action-icon" />
          <img src="{% static 'edit-icon.png' %}" alt="Edit" class="action-icon" />
          <img src="{% static 'share-icon.png' %}" alt="Share" class="action-icon" />
        </div>
      </div>
    </div>

    <!-- Survey 3 -->
    <div class="survey-item">
      <div class="survey-content">
        <h2 class="survey-title">Enkät 3</h2>
        <div class="survey-actions">
          <img src="{% static 'trashcan.png' %}" alt="Delete" class="action-icon" />
          <img src="{% static 'edit-icon.png' %}" alt="Edit" class="action-icon" />
          <img src="{% static 'share-icon.png' %}" alt="Share" class="action-icon" />
        </div>
      </div>
    </div>

  

  <!-- Add Survey -->
  <div class="add-survey-container">
    <button type="button" class="add-survey-button">Lägg till enkät</button>
  </div>
</div>

  <!-- Toggle View Script -->
  <script>
    document.getElementById('toggle-view').addEventListener('click', function () {
      const surveyList = document.getElementById('surveyList');
      surveyList.classList.toggle('list-view');
      surveyList.classList.toggle('grid-view');
    });
  </script>

</body>
</html>
