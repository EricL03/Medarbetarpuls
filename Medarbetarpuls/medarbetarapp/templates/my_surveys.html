{% load static %}
<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mina enkäter</title>
  <script src="https://unpkg.com/htmx.org@1.8.4"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      background-color: #f8f9fa;
      position: relative;
    }

    .logo, .back-button {
      height: 40px;
      cursor: pointer;
    }

    .survey {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 24px;
      color: rgb(0, 132, 255);
    }

    .search-container {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 20px;
      gap: 10px;
    }

    .search-bar {
      width: 50%;
      padding: 10px 20px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 500px;
    }

    .search-button {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .search-button:hover {
      background-color: #0056b3;
    }

    .view-icons {
      display: flex;
      gap: 10px;
    }

    .view-icon {
      width: 40px;
      height: 40px;
      cursor: pointer;
    }

    .survey-list {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .list-view .survey-item {
      display: block;
      width: 90%;
      padding: 10px;
      margin-bottom: 10px;
    }

    .grid-view .survey-item {
      width: 300px;
      height: 300px;
      display: flex;
      flex-direction: column;
    }

    .survey-item {
      background-color: #f8f9fa;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 15px;
      text-align: center;
      border-bottom: 4px solid lightgreen;
    }

    .survey-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .survey-title {
      font-size: 13px;
      color: #007bff;
    }

    .survey-icons {
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .tooltip {
      position: relative;
      display: inline-block;
      width: 24px;
      height: 24px;
    }

    .tooltip img.icon-img {
      width: 100%;
      height: 100%;
      display: block;
    }

    .tooltip .x-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .tooltip::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: -35px;
      left: 50%;
      transform: translateX(-50%);
      background: #007bff;
      color: #fff;
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 4px;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      z-index: 10;
    }

    .tooltip:hover::after {
      opacity: 1;
    }

    .survey-actions {
      display: flex;
      gap: 15px;
      justify-content: center;
    }

    .action-icon {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .add-survey-container {
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }

    .add-survey-button {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .add-survey-button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <header class="top-bar">
    <div class="left-icon">
      <img src="{% static 'logo.png' %}" alt="logo" class="logo" />
    </div>
    <h1 class="survey">Mina enkäter</h1>
    <div class="right-icon">
      <img src="{% static 'go-back-btn.png' %}" alt="back" class="back-button" />
    </div>
  </header>

  <div class="search-container">
    <input type="text" id="search-bar" class="search-bar" placeholder="Sök enkäter..." />
    <button type="button" class="search-button">Sök</button>
    <div class="view-icons">
      <img src="{% static 'list.png' %}" alt="List View" class="view-icon" onclick="setListView()" />
      <img src="{% static 'grid.png' %}" alt="Grid View" class="view-icon" onclick="setGridView()" />
    </div>
  </div>

  <div class="survey-list list-view" id="surveyList">
    <!-- Enkät 1: anonym & resultat visas -->
    <div class="survey-item">
      <div class="survey-content">
        <div class="survey-icons">
          <span class="tooltip" data-tooltip="Samtliga svar är anonymiserade">
            <img src="{% static 'anonymous.png' %}" alt="Anonymous" class="icon-img" />
          </span>
          <span class="tooltip" data-tooltip="Resultatet presenteras efter deadline">
            <img src="{% static 'info.png' %}" alt="Info" class="icon-img" />
          </span>
        </div>
        <h2 class="survey-title">Enkät 1</h2>
        <div class="survey-actions">
          <img src="{% static 'trashcan.png' %}" alt="Delete" class="action-icon" />
          <img src="{% static 'edit-icon.png' %}" alt="Edit" class="action-icon" />
          <img src="{% static 'share-icon.png' %}" alt="Share" class="action-icon" />
        </div>
      </div>
    </div>

    <!-- Enkät 2: ej anonym & resultat EJ visas -->
    <div class="survey-item">
      <div class="survey-content">
        <div class="survey-icons">
          <span class="tooltip" data-tooltip="Svaren är INTE anonymiserade">
            <img src="{% static 'anonymous.png' %}" alt="Anonymous" class="icon-img" />
            <img src="{% static 'x.png' %}" alt="X" class="x-overlay" />
          </span>
          <span class="tooltip" data-tooltip="Resultatet presenteras inte efter deadline">
            <img src="{% static 'info.png' %}" alt="Info" class="icon-img" />
            <img src="{% static 'x.png' %}" alt="X" class="x-overlay" />
          </span>
        </div>
        <h2 class="survey-title">Enkät 2</h2>
        <div class="survey-actions">
          <img src="{% static 'trashcan.png' %}" alt="Delete" class="action-icon" />
          <img src="{% static 'edit-icon.png' %}" alt="Edit" class="action-icon" />
          <img src="{% static 'share-icon.png' %}" alt="Share" class="action-icon" />
        </div>
      </div>
    </div>

    <!-- Enkät 3: samma som enkät 2 -->
    <div class="survey-item">
      <div class="survey-content">
        <div class="survey-icons">
          <span class="tooltip" data-tooltip="Svaren är INTE anonymiserade">
            <img src="{% static 'anonymous.png' %}" alt="Anonymous" class="icon-img" />
            <img src="{% static 'x.png' %}" alt="X" class="x-overlay" />
          </span>
          <span class="tooltip" data-tooltip="Resultatet presenteras inte efter deadline">
            <img src="{% static 'info.png' %}" alt="Info" class="icon-img" />
            <img src="{% static 'x.png' %}" alt="X" class="x-overlay" />
          </span>
        </div>
        <h2 class="survey-title">Enkät 3</h2>
        <div class="survey-actions">
          <img src="{% static 'trashcan.png' %}" alt="Delete" class="action-icon" />
          <img src="{% static 'edit-icon.png' %}" alt="Edit" class="action-icon" />
          <img src="{% static 'share-icon.png' %}" alt="Share" class="action-icon" />
        </div>
      </div>
    </div>
  </div>

  <div class="add-survey-container">
    <button type="button" class="add-survey-button">
      <img src="{% static 'add.png' %}" alt="Add Survey" class="action-icon" />
    </button>
  </div>

  <script>
    function setListView() {
      const surveyList = document.getElementById('surveyList');
      surveyList.classList.remove('grid-view');
      surveyList.classList.add('list-view');
    }

    function setGridView() {
      const surveyList = document.getElementById('surveyList');
      surveyList.classList.remove('list-view');
      surveyList.classList.add('grid-view');
    }
  </script>
</body>
</html>
