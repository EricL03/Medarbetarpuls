<!-- Create account -->
<!DOCTYPE html>
<html lang="sv">
  <head>
    {% load static %}
    <script src="https://unpkg.com/htmx.org@1.8.4"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skapa ditt nya konto</title>
    <link rel="stylesheet" href="{% static 'styles.css' %}" />
  </head>
  <body>
    <!-- To test this, switch to create_acc.html in views.py -->
    <body>
      <div class="account-container">
        <h2>Skapa ditt nya konto</h2>
        <form class="account-form" action="..." method="POST">
          <label for="name">Namn:</label>
          <input type="text" id="name" name="name" placeholder="Namn" required />
    
          <label for="email">Mejladress:</label>
          <input type="email" id="email" name="email" placeholder="Mejladress" required />
    
          <label for="password">Lösenord:</label>
          <input type="password" id="password" name="password" placeholder="Lösenord" required />
    
          <button type="submit">Skapa nytt konto</button>
        </form>
      </div>
    </body>
</html>
